<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  KOLTYN OS — index.html                                         ║
  ║  Personal Life Operating System                                  ║
  ║                                                                  ║
  ║  6 Pages:                                                        ║
  ║    Dashboard   — Daily overview, morning routine & vision board ║
  ║    Nutrition   — Macro planning (bulk / maintain / cut)         ║
  ║    Workout     — PPL split, recovery + ramping phases           ║
  ║    Business    — Envosta 9-stage framework & priorities         ║
  ║    Wealth      — Net worth tracker, investments, income streams ║
  ║    Creative    — Songs, setlists, guitar practice log           ║
  ║                                                                  ║
  ║  Files:                                                          ║
  ║    index.html         ← You are here (nav + page shells)        ║
  ║    style.css          ← Shared design system + nav styles       ║
  ║    app.js             ← Router + shared utilities               ║
  ║    nutrition/page.js  ← Nutrition page logic                    ║
  ║    workout/page.js    ← Workout page logic                      ║
  ║    business/page.js   ← Business page logic                     ║
  ║    wealth/page.js     ← Wealth page logic                       ║
  ║    creative/page.js   ← Creative page logic                     ║
  ║    vision/page.js     ← Vision board logic                      ║
  ╚══════════════════════════════════════════════════════════════════╝
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Koltyn OS</title>

  <!-- ── PWA Manifest ── -->
  <link rel="manifest" href="manifest.json" />

  <!-- ── Theme colour — controls browser chrome on Android ── -->
  <meta name="theme-color" content="#0b0f14" />

  <!-- ── iOS / Safari PWA meta tags ──
       These are required for "Add to Home Screen" on iPhone/iPad to behave
       like a native app (no Safari address bar, full screen, custom icon).
  -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Koltyn OS" />

  <!-- Apple touch icons — iOS picks the closest size -->
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png" />

  <!-- Fallback icon for other browsers -->
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />

  <!-- ── iOS safe area insets ──
       padding-bottom: env(safe-area-inset-bottom) in CSS handles the
       iPhone home indicator so nothing hides behind it.
  -->
  <style>
    /* Applied immediately before style.css loads to prevent flash */
    html { background: #0b0f14; }
  </style>

  <!--
    Fonts: Rajdhani (display/headings) + DM Sans (body)
    Service worker caches these after first online load.
  -->
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════════
       SIDEBAR NAVIGATION
       On desktop: fixed left sidebar
       On mobile: bottom tab bar
  ═══════════════════════════════════════════════ -->
  <nav class="sidebar" id="sidebar">

    <!-- App logo / wordmark -->
    <div class="nav-brand">
      <div class="nav-brand-icon">K</div>
      <div class="nav-brand-text">
        <div class="nav-brand-name">Koltyn OS</div>
        <div class="nav-brand-sub">Life Operating System</div>
      </div>
    </div>

    <!-- Navigation links — JS adds "active" class to current page -->
    <div class="nav-links">

      <a class="nav-item" data-page="dashboard" href="#dashboard">
        <span class="nav-icon">⬡</span>
        <span class="nav-label">Dashboard</span>
      </a>

      <div class="nav-divider"></div>

      <a class="nav-item" data-page="nutrition" href="#nutrition">
        <span class="nav-icon">◈</span>
        <span class="nav-label">Nutrition</span>
      </a>

      <a class="nav-item" data-page="workout" href="#workout">
        <span class="nav-icon">◉</span>
        <span class="nav-label">Workout</span>
      </a>

      <div class="nav-divider"></div>

      <a class="nav-item" data-page="business" href="#business">
        <span class="nav-icon">◧</span>
        <span class="nav-label">Business</span>
      </a>

      <a class="nav-item" data-page="wealth" href="#wealth">
        <span class="nav-icon">◈</span>
        <span class="nav-label">Wealth</span>
      </a>

      <div class="nav-divider"></div>

      <a class="nav-item" data-page="creative" href="#creative">
        <span class="nav-icon">♫</span>
        <span class="nav-label">Creative</span>
      </a>

    </div>

    <!-- Current goal pinned at bottom of sidebar -->
    <div class="nav-goal">
      <div class="nav-goal-label">North Star</div>
      <div class="nav-goal-text">$50K MRR · 200 lbs · 15% BF</div>
    </div>

  </nav><!-- /sidebar -->


  <!-- ══════════════════════════════════════════════
       MAIN CONTENT AREA
       Each page is a <section> — JS shows/hides them.
  ═══════════════════════════════════════════════ -->
  <main class="main-content" id="mainContent">

    <!-- ── DASHBOARD PAGE ─────────────────────── -->
    <section class="page" id="page-dashboard" data-accent="dashboard">
      <div class="page-inner" id="dashboard-inner"></div>
    </section>

    <!-- ── NUTRITION PAGE ────────────────────── -->
    <section class="page" id="page-nutrition" data-accent="nutrition">

      <!-- Recipe modal lives inside nutrition page -->
      <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
          <div class="modal-drag-handle"></div>
          <div class="modal-header">
            <div class="modal-header-info">
              <div class="modal-eyebrow"  id="modalEyebrow"></div>
              <div class="modal-title"    id="modalTitle"></div>
              <div class="modal-tags">
                <span class="category-badge" id="modalCatBadge"></span>
                <span class="cuisine-tag"    id="modalCuisineTag"></span>
              </div>
              <div class="modal-macros">
                <span class="modal-macro-chip mmc-cal" id="mCalChip"></span>
                <span class="modal-macro-chip mmc-p"   id="mProChip"></span>
                <span class="modal-macro-chip mmc-c"   id="mCarbChip"></span>
                <span class="modal-macro-chip mmc-f"   id="mFatChip"></span>
              </div>
            </div>
            <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
          </div>
          <div class="modal-body" id="modalBody">
            <div class="modal-loading">
              <div class="spinner"></div>
              <div class="loading-text">Fetching Recipe</div>
              <div class="loading-sub">Ingredients, directions &amp; cultural history…</div>
            </div>
          </div>
        </div>
      </div>

      <div class="page-inner" id="nutrition-inner"></div>
    </section>

    <!-- ── WORKOUT PAGE ───────────────────────── -->
    <section class="page" id="page-workout" data-accent="workout">
      <!-- Exercise detail modal -->
      <div class="ex-modal-overlay" id="exModalOverlay">
        <div class="ex-modal">
          <div class="modal-drag-handle"></div>
          <div class="ex-modal-header">
            <div class="ex-modal-info">
              <div class="ex-modal-eyebrow" id="exModalEyebrow"></div>
              <div class="ex-modal-title"   id="exModalTitle"></div>
              <div class="ex-modal-chips"   id="exModalChips"></div>
            </div>
            <button class="modal-close" id="exModalClose">✕</button>
          </div>
          <div class="ex-modal-body" id="exModalBody"></div>
        </div>
      </div>
      <div class="page-inner" id="workout-inner"></div>
    </section>

    <!-- ── BUSINESS PAGE ─────────────────────── -->
    <section class="page" id="page-business" data-accent="business">
      <div class="page-inner" id="business-inner"></div>
    </section>

    <!-- ── WEALTH PAGE ────────────────────────── -->
    <section class="page" id="page-wealth" data-accent="wealth">
      <div class="page-inner" id="wealth-inner"></div>
    </section>

    <!-- ── CREATIVE PAGE ─────────────────────── -->
    <section class="page" id="page-creative" data-accent="creative">
      <div class="page-inner" id="creative-inner"></div>
    </section>

  </main><!-- /main-content -->

  <!-- Load personal data first, then state (IndexedDB persistence), then shared utilities, then each page module -->
  <script src="data.js"></script>
  <script src="state.js"></script>
  <script src="app.js"></script>
  <script src="pages/dashboard.js"></script>
  <script src="pages/nutrition.js"></script>
  <script src="pages/workout.js"></script>
  <script src="pages/business.js"></script>
  <script src="pages/wealth.js"></script>
  <script src="pages/creative.js"></script>

  <!-- ── Service Worker Registration ──
       Registers sw.js which caches all app files for offline use.
       'navigator.serviceWorker' check ensures graceful fallback on
       browsers that don't support PWA (rare but safe practice).
  -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js', { scope: './' })
        .then(reg => console.log('[SW] Registered, scope:', reg.scope))
        .catch(err => console.warn('[SW] Registration failed:', err));
    }
  </script>

</body>
</html>
